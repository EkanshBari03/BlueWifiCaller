name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5 
          # This tells GitHub to ignore the empty JAR file in your repo
          validate-wrappers: false

      - name: Build Debug APK
        working-directory: ./BlueWifiCaller
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BlueWifiCaller-debug
          path: BlueWifiCaller/**/build/outputs/apk/debug/*.apk
